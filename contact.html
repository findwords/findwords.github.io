<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contact Us — Find Words</title>
<meta name="description" content="Get in touch with Mujtaba at Find Words. Send us your vocabulary suggestions, technical feedback, or system questions." />
<meta name="robots" content="index, follow" />
<link rel="canonical" href="https://findwords.github.io/contact" />

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect rx='20' width='100' height='100' fill='%23FF6B5F'/%3E%3Ctext x='50' y='68' font-size='58' text-anchor='middle' fill='white' font-family='monospace'%3EF%3C/text%3E%3C/svg%3E" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="css/style.css" />

<style>
  .contact-layout {
    max-width: 840px;
    margin: 64px auto;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 56px 48px;
    box-shadow: var(--shadow-card);
  }
  .contact-layout h1 { font-size: 2.8rem; margin-bottom: 12px; }
  .contact-layout p { color: var(--ink-soft); font-size: 1.05rem; margin-bottom: 32px; }
  
  .contact-methods {
    margin-bottom: 40px;
  }
  .contact-card {
    background: var(--cream);
    border: 1px solid var(--line);
    border-radius: var(--radius-md);
    padding: 24px 28px;
    margin-bottom: 24px;
  }
  .contact-card h3 { font-family: var(--font-mono); font-size: 0.8rem; text-transform: uppercase; color: var(--coral-dark); margin: 0 0 6px; }
  .contact-card .email-link { font-family: var(--font-display); font-size: 1.5rem; color: var(--ink); text-decoration: none; font-weight: 600; display: inline-block; word-break: break-all; }
  .contact-card .email-link:hover { color: var(--violet); }
  
  .form-group {
    margin-bottom: 20px;
  }
  .form-group label {
    display: block;
    font-family: var(--font-mono);
    font-size: 0.75rem;
    text-transform: uppercase;
    color: var(--ink);
    margin-bottom: 6px;
    letter-spacing: 0.04em;
  }
  .form-group input, .form-group textarea {
    width: 100%;
    font-family: var(--font-body);
    font-size: 1rem;
    padding: 12px 16px;
    border: 1.5px solid var(--line);
    border-radius: var(--radius-sm);
    background: var(--paper);
    color: var(--ink);
  }
  .form-group input:focus, .form-group textarea:focus {
    border-color: var(--violet);
    outline: none;
  }
  
  @media (max-width: 720px) {
    .contact-layout { padding: 28px 20px; margin: 32px auto; }
    .contact-card .email-link { font-size: 1.2rem; }
  }
</style>

</head>
<body>

<header class="site-header" id="site-header"></header>

<main class="container">
  <section class="contact-layout">
    <span class="eyebrow">get in touch &middot; support</span>
    <h1>Contact Us</h1>
    <p>Have an expansion word list suggestion? Found a missing word definition or encountered a browser script error? We welcome your feedback, platform suggestions, and business inquiries.</p>

    <div class="contact-methods">
      <div class="contact-card">
        <h3>Direct Email Support</h3>
        <a href="mailto:mujtabaaltafkhi@gmail.com" class="email-link">mujtabaaltafkhi@gmail.com</a>
      </div>
    </div>

    <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST" onsubmit="alert('Thank you for reaching out! Your message has been simulated.'); return false;">
      <h2 style="font-size: 1.5rem; margin-bottom: 18px; border-bottom: 1px solid var(--line); padding-bottom: 6px;">Send a Quick Message</h2>
      
      <div class="form-group">
        <label for="user-name">Your Name</label>
        <input type="text" id="user-name" name="name" placeholder="e.g. Jane Doe" required />
      </div>
      
      <div class="form-group">
        <label for="user-email">Email Address</label>
        <input type="email" id="user-email" name="email" placeholder="e.g. jane@example.com" required />
      </div>
      
      <div class="form-group">
        <label for="user-message">Your Message</label>
        <textarea id="user-message" name="message" rows="5" placeholder="Type your suggestion or question here..." required></textarea>
      </div>
      
      <button class="btn btn-primary" type="submit" style="margin-top: 8px;">✉ Send Message</button>
    </form>
  </section>
</main>

<footer class="site-footer" id="site-footer"></footer>

<script src="/js/header.js" defer></script>
<script src="/js/footer.js" defer></script>
<script src="/js/app.js" defer></script>
</body>
</html>
